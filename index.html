<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#F7F5F8" />
<title>10 가르기</title>
<style>
  :root{
    --bg:#F7F5F8;
    --purple:#6750A4;
    --pink:#EF6984;
    --orange:#FEA853;
    --green:#93DD62;
    --blue:#5386FE;
    --empty:#EBE9EC;
    --pause:#FC8D4A;
    --wrong:#E04B5C;
    --shadow:0 4px 10px rgba(33,28,46,.10), 0 1px 2px rgba(33,28,46,.08);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;
    padding:0;
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }
  body{
    background:var(--bg);
    color:#211c2e;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",
      "Segoe UI",Roboto,sans-serif;
    user-select:none;
    -webkit-user-select:none;
  }
  button{
    font-family:inherit;
    border:0;
    background:transparent;
    cursor:pointer;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }

  .app{
    max-width:560px;
    margin:0 auto;
    height:100vh;
    height:100dvh;
    max-height:100vh;
    max-height:100dvh;
    overflow:hidden;
    padding:
      calc(env(safe-area-inset-top,0px) + 14px)
      18px
      calc(env(safe-area-inset-bottom,0px) + 14px);
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  /* Header --------------------------------------------------------------- */
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex:0 0 auto;
  }
  .score-pill{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:var(--purple);
    border-radius:999px;
    padding:6px 18px 6px 6px;
    color:#fff;
    box-shadow:var(--shadow);
    min-height:52px;
  }
  .score-badge{
    width:40px;
    height:40px;
    border-radius:50%;
    background:var(--purple);
    border:2px solid rgba(255,255,255,.18);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .score-badge svg{width:22px;height:22px;}
  .score-num{
    font-size:24px;
    font-weight:900;
    line-height:1;
    min-width:18px;
    text-align:center;
    letter-spacing:.5px;
  }
  .pause-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 8px;
    border-radius:10px;
  }
  .pause-btn .bar{
    width:12px;
    height:40px;
    border-radius:4px;
    background:var(--pause);
  }

  /* Problem -------------------------------------------------------------- */
  .problem-wrap{
    display:flex;
    justify-content:center;
    margin-top:2px;
    flex:0 0 auto;
  }
  .problem{
    width:110px;
    height:110px;
    border-radius:50%;
    background:var(--pink);
    color:#fff;
    font-weight:900;
    font-size:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:var(--shadow);
    line-height:1;
  }
  .problem.shake{
    animation:problemShake 500ms ease-in-out both;
    will-change:transform;
  }
  @keyframes problemShake{
    0%   { transform:translateX(0); }
    8%   { transform:translateX(-10px); }
    25%  { transform:translateX(10px); }
    42%  { transform:translateX(-10px); }
    58%  { transform:translateX(10px); }
    75%  { transform:translateX(-10px); }
    92%  { transform:translateX(10px); }
    100% { transform:translateX(0); }
  }

  /* Cells ---------------------------------------------------------------- */
  .cells{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    justify-content:center;
    gap:12px;
    margin:32px auto 0;
    padding:0;
    width:max-content;
    flex:1 1 auto;
    min-height:0;
  }
  .cells-row{
    display:flex;
    justify-content:flex-start;
    gap:12px;
    margin:0;
    padding:0;
  }
  .cell{
    width:var(--cell-size, 64px);
    height:var(--cell-size, 64px);
    border-radius:12px;
    background:var(--empty);
    transition:background-color .15s ease;
  }
  .cell.pop{
    animation:cellPop 450ms ease-out both;
    will-change:transform, box-shadow, background-color;
  }
  .cell.wrong{
    animation:cellWrong 500ms ease-in-out both;
    will-change:transform, box-shadow, background-color;
  }
  @keyframes cellWrong{
    0%{
      transform:translateX(0);
      background-color:#FF5A6E;
      box-shadow:0 0 0 0 rgba(255,90,110,0);
    }
    20%{
      transform:translateX(-4px);
      background-color:#FF5A6E;
      box-shadow:0 0 0 6px rgba(255,90,110,.45);
    }
    40%{
      transform:translateX(4px);
      background-color:#FF5A6E;
      box-shadow:0 0 0 8px rgba(255,90,110,.35);
    }
    60%{
      transform:translateX(-3px);
      background-color:#FF5A6E;
      box-shadow:0 0 0 6px rgba(255,90,110,.30);
    }
    80%{
      transform:translateX(3px);
      background-color:#FF5A6E;
      box-shadow:0 0 0 4px rgba(255,90,110,.20);
    }
    100%{
      transform:translateX(0);
      background-color:#FF5A6E;
      box-shadow:0 0 0 0 rgba(255,90,110,0);
    }
  }
  .cell.pop{
    background-color:var(--pop-color, #7BD957);
  }
  @keyframes cellPop{
    0%{
      transform:scale(1);
      box-shadow:0 0 0 0 transparent;
      background-color:var(--pop-color, #7BD957);
    }
    35%{
      transform:scale(1.18);
      box-shadow:0 0 0 6px color-mix(in srgb, var(--pop-color, #7BD957) 35%, transparent);
      background-color:var(--pop-color, #7BD957);
    }
    70%{
      transform:scale(.96);
      box-shadow:0 0 0 3px color-mix(in srgb, var(--pop-color, #7BD957) 18%, transparent);
      background-color:var(--pop-color, #7BD957);
    }
    100%{
      transform:scale(1);
      box-shadow:0 0 0 0 transparent;
      background-color:var(--pop-color, #7BD957);
    }
  }

  /* Score "+1" floater --------------------------------------------------- */
  .score-pop{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    color:#fff;
    font-size:22px;
    font-weight:900;
    pointer-events:none;
    text-shadow:0 2px 6px rgba(20,16,32,.45), 0 0 2px rgba(20,16,32,.6);
    animation:scorePop 700ms ease-out forwards;
    z-index:5;
  }
  @keyframes scorePop{
    0%{
      opacity:1;
      transform:translate(-50%, -50%);
    }
    100%{
      opacity:0;
      transform:translate(-50%, calc(-50% - 32px));
    }
  }

  /* Star badge bounce ---------------------------------------------------- */
  .score-badge.bounce{
    animation:starBounce 700ms cubic-bezier(.34, 1.56, .64, 1);
  }
  @keyframes starBounce{
    0%{
      transform:rotate(0deg) scale(1);
      box-shadow:0 0 0 0 rgba(255,255,255,0);
    }
    35%{
      transform:rotate(360deg) scale(1.6);
      box-shadow:0 0 0 8px rgba(255,255,255,.35);
    }
    60%{
      transform:rotate(360deg) scale(.85);
      box-shadow:0 0 0 4px rgba(255,255,255,.18);
    }
    80%{
      transform:rotate(360deg) scale(1.15);
      box-shadow:0 0 0 2px rgba(255,255,255,.10);
    }
    100%{
      transform:rotate(360deg) scale(1);
      box-shadow:0 0 0 0 rgba(255,255,255,0);
    }
  }

  /* Message -------------------------------------------------------------- */
  .message{
    text-align:center;
    color:var(--wrong);
    font-weight:800;
    font-size:18px;
    min-height:22px;
    visibility:hidden;
    opacity:0;
    transform:translateY(-12px) scale(.9);
    letter-spacing:-.2px;
    flex:0 0 auto;
    will-change:transform, opacity;
  }
  .message.show{
    visibility:visible;
    animation:messageIn 400ms cubic-bezier(.34, 1.56, .64, 1) forwards,
              messagePulse 600ms ease-in-out 400ms 1;
  }
  @keyframes messageIn{
    0%{
      opacity:0;
      transform:translateY(-12px) scale(.9);
    }
    100%{
      opacity:1;
      transform:translateY(0) scale(1);
    }
  }
  @keyframes messagePulse{
    0%   { transform:translateY(0) scale(1); }
    25%  { transform:translateY(0) scale(1.05); }
    50%  { transform:translateY(0) scale(1); }
    75%  { transform:translateY(0) scale(1.05); }
    100% { transform:translateY(0) scale(1); }
  }

  /* Palette -------------------------------------------------------------- */
  .palette{
    margin-top:auto;
    margin-bottom:38px;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:4px 24px;
    padding:6px 4px 10px;
    width:100%;
    flex:0 0 auto;
  }
  .chip-group{
    display:grid;
    grid-template-columns:repeat(2, 28px);
    grid-auto-rows:28px;
    justify-content:center;
    align-content:center;
    justify-items:center;
    align-items:center;
    gap:5px;
    padding:6px;
    border-radius:16px;
    background:transparent;
    width:100%;
    min-height:160px;
    transition:opacity .15s ease, transform .1s ease;
  }
  .chip-group:active{transform:scale(.96);}
  .chip-group[data-used="1"]{
    opacity:.35;
    pointer-events:none;
  }
  .chip-block{
    width:28px;
    height:28px;
    border-radius:8px;
    box-shadow:var(--shadow);
    display:block;
  }
  .chip-block.placeholder{
    visibility:hidden;
    box-shadow:none;
  }
  .chip-group[data-color="pink"] .chip-block{background:var(--pink);}
  .chip-group[data-color="orange"] .chip-block{background:var(--orange);}
  .chip-group[data-color="blue"] .chip-block{background:var(--blue);}
  .chip-group[data-color="green"] .chip-block{background:var(--green);}

  /* Modal ---------------------------------------------------------------- */
  .backdrop{
    position:fixed;
    inset:0;
    background:rgba(20,16,32,.45);
    display:none;
    align-items:center;
    justify-content:center;
    padding:24px;
    z-index:50;
  }
  .backdrop.open{display:flex;}
  .modal{
    background:#fff;
    border-radius:24px;
    padding:28px 24px 24px;
    width:100%;
    max-width:320px;
    box-shadow:0 20px 50px rgba(20,16,32,.25);
    text-align:center;
  }
  .modal h2{
    margin:0 0 22px;
    font-size:24px;
    font-weight:900;
    color:#211c2e;
    letter-spacing:.5px;
  }
  .modal-actions{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .modal-btn{
    width:100%;
    padding:14px 16px;
    border-radius:14px;
    font-size:17px;
    font-weight:800;
  }
  .modal-btn.primary{
    background:var(--purple);
    color:#fff;
  }
  .modal-btn.ghost{
    background:#EFEAF6;
    color:var(--purple);
  }

  /* Responsive ----------------------------------------------------------- */
  @media (max-height:760px){
    .app{gap:10px;}
    .cells{margin-top:24px;}
    .problem{width:92px;height:92px;font-size:50px;}
    .chip-group{min-height:140px;}
  }
  @media (max-height:680px){
    .app{
      gap:8px;
      padding-top:calc(env(safe-area-inset-top,0px) + 10px);
      padding-bottom:calc(env(safe-area-inset-bottom,0px) + 8px);
    }
    .cells{margin-top:18px;gap:8px;}
    .cells-row{gap:8px;}
    .problem{width:78px;height:78px;font-size:42px;}
    .score-pill{min-height:44px;}
    .score-badge{width:34px;height:34px;}
    .score-badge svg{width:18px;height:18px;}
    .score-num{font-size:20px;}
    .pause-btn .bar{height:32px;width:10px;}
    .chip-block{width:22px;height:22px;border-radius:7px;}
    .chip-group{
      padding:4px;
      gap:3px;
      grid-template-columns:repeat(2, 22px);
      grid-auto-rows:22px;
      min-height:112px;
    }
    .palette{gap:2px 16px;padding:4px 2px 6px;margin-bottom:4px;}
    .message{font-size:15px;min-height:18px;}
  }
  @media (max-height:580px){
    .problem{width:64px;height:64px;font-size:34px;}
    .chip-block{width:18px;height:18px;border-radius:6px;}
    .chip-group{
      grid-template-columns:repeat(2, 18px);
      grid-auto-rows:18px;
      min-height:92px;
      gap:2px;
    }
    .cells{margin-top:12px;gap:6px;}
    .cells-row{gap:6px;}
  }
</style>
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <div class="score-pill" id="scorePill" aria-label="점수">
        <span class="score-badge" id="scoreBadge" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.6l2.74 5.55 6.13.89-4.43 4.32 1.05 6.1L12 16.98l-5.49 2.48 1.05-6.1L3.13 9.04l6.13-.89L12 2.6z" fill="#fff"/>
          </svg>
        </span>
        <span class="score-num" id="score">0</span>
      </div>
      <button type="button" class="pause-btn" id="pauseBtn" aria-label="일시정지">
        <span class="bar"></span><span class="bar"></span>
      </button>
    </header>

    <div class="problem-wrap">
      <div class="problem" id="problem">10</div>
    </div>

    <div class="cells" id="cells"></div>

    <div class="message" id="message">다시 한번 해보자 🐥</div>

    <div class="palette" id="palette"></div>
  </div>

  <div class="backdrop" id="backdrop" role="dialog" aria-modal="true" aria-labelledby="pauseTitle">
    <div class="modal">
      <h2 id="pauseTitle">일시정지</h2>
      <div class="modal-actions">
        <button type="button" class="modal-btn primary" id="resumeBtn">계속하기</button>
        <button type="button" class="modal-btn ghost" id="restartBtn">다시 시작</button>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // Palette colors stay fixed in their quadrant order; only the
  // per-group values change each problem (regenerated by buildGroups).
  var COLORS = ["pink", "orange", "blue", "green"];
  var RAINBOW = ["#FF5A6E", "#FF9E3D", "#FFD93D", "#7BD957", "#5BD0E0", "#5386FE", "#A06CFF", "#EF6FB3"];
  var GROUPS = [
    {color:"pink",   value:2},
    {color:"orange", value:3},
    {color:"blue",   value:4},
    {color:"green",  value:5}
  ];

  function randInt(min, max){
    // inclusive range [min, max]
    return min + Math.floor(Math.random() * (max - min + 1));
  }

  function shuffleInPlace(arr){
    for (var i = arr.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function buildGroups(problem){
    // Pick a + b that sum exactly to the problem (guarantees solvable),
    // then add 2 distractors in [1, problem-1]. Shuffle and assign to
    // the fixed color order so colors keep their quadrant positions.
    var a = randInt(1, problem - 1);
    var b = problem - a;
    var d1 = randInt(1, problem - 1);
    var d2 = randInt(1, problem - 1);
    var values = shuffleInPlace([a, b, d1, d2]);
    for (var i = 0; i < COLORS.length; i++){
      GROUPS[i] = {color:COLORS[i], value:values[i]};
    }
  }

  var state = {
    score:0,
    problem:0,
    filled:0,
    picks:[],
    locked:false,
    paused:false
  };

  var els = {
    score:document.getElementById("score"),
    scorePill:document.getElementById("scorePill"),
    scoreBadge:document.getElementById("scoreBadge"),
    problem:document.getElementById("problem"),
    cells:document.getElementById("cells"),
    message:document.getElementById("message"),
    palette:document.getElementById("palette"),
    pauseBtn:document.getElementById("pauseBtn"),
    backdrop:document.getElementById("backdrop"),
    resumeBtn:document.getElementById("resumeBtn"),
    restartBtn:document.getElementById("restartBtn")
  };

  function randomProblem(prev){
    // Range 5..10 inclusive, never repeat the previous number.
    var n;
    do { n = 5 + Math.floor(Math.random() * 6); } while (n === prev);
    return n;
  }

  function updateCellSize(){
    var total = state.problem;
    if (!total) return;
    var maxPerRow = Math.ceil(total / 2); // widest row
    // Available width inside the 560-max container minus side padding (18+18=36).
    var availW = Math.min(window.innerWidth, 560) - 36;
    var gap = 12;
    // Cap the max cell size based on viewport height (replaces old hardcoded
    // px overrides in the small-height media queries).
    var vh = window.innerHeight || document.documentElement.clientHeight;
    var cap = 72;
    var rowGap = 12;
    // Reserve space for header (~70) + problem (~130) + palette (~260)
    // + gaps/safe-areas + slack. Tunable single constant.
    var reserved = 502;
    if (vh <= 580){
      cap = 38;
      rowGap = 6;
      reserved = 372;
    } else if (vh <= 680){
      cap = 46;
      rowGap = 8;
      reserved = 402;
    } else if (vh <= 760){
      cap = 56;
      rowGap = 10;
      reserved = 442;
    }
    var availHForCells = vh - reserved;
    // 2 rows of cells with one inter-row gap.
    var sizeByH = (availHForCells - rowGap) / 2;
    var sizeByW = (availW - gap * (maxPerRow - 1)) / maxPerRow;
    var size = Math.floor(Math.min(cap, sizeByW, sizeByH));
    // Floor so it never gets absurdly tiny on very small screens.
    size = Math.max(size, 28);
    document.documentElement.style.setProperty("--cell-size", size + "px");
  }

  function renderCells(){
    els.cells.innerHTML = "";
    var total = state.problem;
    // Always split into 2 rows when total >= 2.
    // r1 = ceil(n/2), r2 = n - r1.  When total === 1, r1 = 1, r2 = 0.
    var firstRow = Math.ceil(total / 2);
    var secondRow = total - firstRow;

    updateCellSize();

    var row1 = document.createElement("div");
    row1.className = "cells-row";
    for (var i = 0; i < firstRow; i++){
      var c = document.createElement("div");
      c.className = "cell";
      row1.appendChild(c);
    }
    els.cells.appendChild(row1);

    if (secondRow > 0){
      var row2 = document.createElement("div");
      row2.className = "cells-row";
      for (var j = 0; j < secondRow; j++){
        var c2 = document.createElement("div");
        c2.className = "cell";
        row2.appendChild(c2);
      }
      els.cells.appendChild(row2);
    }
  }

  function getCellEls(){
    return els.cells.querySelectorAll(".cell");
  }

  function clearCells(){
    var cells = getCellEls();
    for (var i = 0; i < cells.length; i++){
      cells[i].style.backgroundColor = "";
    }
  }

  function fillCells(count, colorVar){
    var cells = getCellEls();
    var filledNow = 0;
    for (var i = 0; i < cells.length && filledNow < count; i++){
      var bg = cells[i].style.backgroundColor;
      if (!bg){
        cells[i].style.backgroundColor = "var(--" + colorVar + ")";
        filledNow++;
      }
    }
  }

  function renderPalette(){
    els.palette.innerHTML = "";
    for (var i = 0; i < GROUPS.length; i++){
      var g = GROUPS[i];
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "chip-group";
      btn.dataset.value = String(g.value);
      btn.dataset.color = g.color;
      btn.dataset.used = "0";
      btn.setAttribute("aria-label", g.value + " " + g.color);
      // For odd N, prepend an invisible placeholder so the grid's
      // top-left cell stays empty and the extra block lands in
      // the top-right (per the 2-column bottom-up layout rule).
      if (g.value % 2 === 1){
        var placeholder = document.createElement("span");
        placeholder.className = "chip-block placeholder";
        placeholder.setAttribute("aria-hidden", "true");
        btn.appendChild(placeholder);
      }
      for (var k = 0; k < g.value; k++){
        var block = document.createElement("span");
        block.className = "chip-block";
        btn.appendChild(block);
      }
      btn.addEventListener("click", onChipTap);
      els.palette.appendChild(btn);
    }
  }

  function resetChips(){
    var chips = els.palette.querySelectorAll(".chip-group");
    for (var i = 0; i < chips.length; i++){
      chips[i].dataset.used = "0";
    }
  }

  function showMessage(){ els.message.classList.add("show"); }
  function hideMessage(){ els.message.classList.remove("show"); }

  function setScore(n){
    state.score = n;
    els.score.textContent = String(n);
  }

  function newProblem(){
    state.problem = randomProblem(state.problem);
    els.problem.textContent = String(state.problem);
    state.filled = 0;
    state.picks = [];
    renderCells();
    buildGroups(state.problem);
    renderPalette();
    // Palette height influences how much vertical room remains for cells,
    // so recompute the cell size after the palette is in the DOM.
    updateCellSize();
    hideMessage();
  }

  function softReset(){
    // same problem; clear cells, reset chips, clear picks
    state.filled = 0;
    state.picks = [];
    clearCells();
    resetChips();
  }

  function wrongFlow(){
    state.locked = true;

    // Effect 1: shake the problem circle.
    if (els.problem){
      els.problem.classList.remove("shake");
      void els.problem.offsetWidth; // restart animation
      els.problem.classList.add("shake");
      setTimeout(function(){
        els.problem.classList.remove("shake");
      }, 520);
    }

    // Effect 2: red-flash all currently filled cells.
    var cells = getCellEls();
    var flashed = [];
    for (var i = 0; i < cells.length; i++){
      if (cells[i].style.backgroundColor){
        cells[i].classList.remove("wrong");
        void cells[i].offsetWidth; // restart animation
        cells[i].classList.add("wrong");
        flashed.push(cells[i]);
      }
    }
    // Strip the .wrong class shortly before the cells reset so the
    // softReset() background clear isn't fighting the animation.
    setTimeout(function(){
      for (var k = 0; k < flashed.length; k++){
        flashed[k].classList.remove("wrong");
      }
    }, 520);

    showMessage();
    setTimeout(function(){
      hideMessage();
      softReset();
      state.locked = false;
    }, 1100);
  }

  function popFilledCells(){
    // Wave-pop every currently filled cell, left-to-right top-to-bottom.
    // The DOM order from getCellEls() already matches that reading order
    // because rows are appended top-first. Each cell flashes the next
    // rainbow color in sequence for a shimmer effect.
    var cells = getCellEls();
    var stagger = 40; // ms between cells
    var idx = 0;
    for (var i = 0; i < cells.length; i++){
      var cell = cells[i];
      if (!cell.style.backgroundColor) continue;
      var rainbowColor = RAINBOW[idx % RAINBOW.length];
      (function(el, delay, color){
        setTimeout(function(){
          // Restart the animation cleanly if it's still attached.
          el.classList.remove("pop");
          // Force reflow so re-adding the class restarts the keyframes.
          void el.offsetWidth;
          el.style.setProperty("--pop-color", color);
          el.classList.add("pop");
          setTimeout(function(){
            el.classList.remove("pop");
            el.style.removeProperty("--pop-color");
          }, 480);
        }, delay);
      })(cell, idx * stagger, rainbowColor);
      idx++;
    }
  }

  function spawnScorePop(){
    if (!els.scorePill) return;
    var pop = document.createElement("span");
    pop.className = "score-pop";
    pop.textContent = "+1";
    els.scorePill.appendChild(pop);
    setTimeout(function(){
      if (pop.parentNode) pop.parentNode.removeChild(pop);
    }, 720);
  }

  function bounceStar(){
    if (!els.scoreBadge) return;
    els.scoreBadge.classList.remove("bounce");
    void els.scoreBadge.offsetWidth; // restart animation
    els.scoreBadge.classList.add("bounce");
    setTimeout(function(){
      els.scoreBadge.classList.remove("bounce");
    }, 740);
  }

  function correctFlow(){
    state.locked = true;
    popFilledCells();
    setScore(state.score + 1);
    spawnScorePop();
    bounceStar();
    setTimeout(function(){
      newProblem();
      state.locked = false;
    }, 600);
  }

  function onChipTap(ev){
    if (state.paused || state.locked) return;
    var chip = ev.currentTarget;
    if (chip.dataset.used === "1") return;

    var value = parseInt(chip.dataset.value, 10);
    var color = chip.dataset.color;

    // First-pick guard: value already > problem
    if (state.picks.length === 0 && value > state.problem){
      chip.dataset.used = "1";
      state.picks.push({value:value, color:color});
      wrongFlow();
      return;
    }

    // Overfill guard
    if (state.filled + value > state.problem){
      chip.dataset.used = "1";
      state.picks.push({value:value, color:color});
      wrongFlow();
      return;
    }

    // Apply pick
    fillCells(value, color);
    state.filled += value;
    chip.dataset.used = "1";
    state.picks.push({value:value, color:color});

    if (state.picks.length === 2){
      var sum = state.picks[0].value + state.picks[1].value;
      if (sum === state.problem){
        correctFlow();
      } else {
        wrongFlow();
      }
    }
  }

  // Pause modal -----------------------------------------------------------
  function openPause(){
    state.paused = true;
    els.backdrop.classList.add("open");
  }
  function closePause(){
    state.paused = false;
    els.backdrop.classList.remove("open");
  }
  els.pauseBtn.addEventListener("click", openPause);
  els.resumeBtn.addEventListener("click", closePause);
  els.restartBtn.addEventListener("click", function(){
    setScore(0);
    state.problem = 0;
    newProblem();
    state.locked = false;
    closePause();
  });
  els.backdrop.addEventListener("click", function(ev){
    if (ev.target === els.backdrop) closePause();
  });

  // Boot ------------------------------------------------------------------
  function init(){
    setScore(0);
    newProblem();
    window.addEventListener("resize", updateCellSize);
    window.addEventListener("orientationchange", updateCellSize);
  }
  init();
})();
</script>
</body>
</html>
